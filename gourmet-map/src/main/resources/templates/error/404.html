<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - 身内グルメマップ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center;">
    <div class="card" style="max-width: 400px; padding: 40px;">
        <h1 style="font-size: 4rem; margin: 0; color: var(--primary-color);">404</h1>
        <h2>ページが見つかりません</h2>
        <p style="margin-bottom: 30px; color: #636e72;">
            もしかして、お店が隠れ家すぎたかもしれません...。<br>
            URLが正しいか確認するか、トップページに戻ってください。
        </p>
        <a th:href="@{/}" class="btn">トップページへ戻る</a>
    </div>
</body>
</html>
