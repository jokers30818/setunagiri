spring.application.name=gourmet-map

# Database Configuration
# Using file-based H2 to persist data across restarts
spring.datasource.url=jdbc:h2:file:./data/gourmetdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging, only accessible by authenticated admin if configured, or disabled in prod)
# We enable it for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf caching disabled for development UI updates
spring.thymeleaf.cache=false

# File Upload limits (optional, for safety)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
