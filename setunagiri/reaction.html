<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anti-Gravity Quick Draw VS</title>
    <style>
        body {
            background-color: #111;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'sans-serif';
            overflow: hidden;
        }
        canvas {
            background-color: #000;
            border: 2px solid #fff;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const STATE_READY = 0;
const STATE_WAIT = 1;
const STATE_SIGNAL = 2;
const STATE_RESULT = 3;

let state = STATE_READY;
let waitTimer = 0;
let signalTime = 0;
let freezeTime = 0;
let resultText = "";

// スコア管理
let streak = 0;
let maxStreak = 0;
let bestTime = 999.999;
let enemyReactionTime = 0;
let enemyHasReacted = false;

// キャラクター管理
let player = {
    baseX: canvas.width / 2 - 200,
    baseY: canvas.height - 150,
    y: 0,
    vy: 0,
    isFoul: false,
    isDefeated: false
};

let enemy = {
    baseX: canvas.width / 2 + 200,
    baseY: canvas.height - 150,
    y: 0,
    vy: 0,
    isFoul: false,
    isDefeated: false
};

function resetCharacters() {
    player.isFoul = false;
    player.isDefeated = false;
    player.vy = 0;
    player.y = player.baseY;

    enemy.isFoul = false;
    enemy.isDefeated = false;
    enemy.vy = 0;
    enemy.y = enemy.baseY;
}

// 背景の反重力パーティクル
let particles = [];
function createParticle() {
    return {
        x: Math.random() * canvas.width,
        y: canvas.height + Math.random() * 50,
        size: Math.random() * 3 + 1,
        speed: Math.random() * 2 + 1,
        alpha: Math.random() * 0.5 + 0.5
    };
}
for(let i = 0; i < 60; i++) particles.push(createParticle());

// 入力イベント（SPACEキー）
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        if (state === STATE_READY) {
            state = STATE_WAIT;
            waitTimer = performance.now() + 1500 + Math.random() * 2500;
            resetCharacters();
            freezeTime = 0;
        } 
        else if (state === STATE_WAIT) {
            state = STATE_RESULT;
            player.isFoul = true;
            player.vy = -25;
            streak = 0; // 連勝リセット
            resultText = "お手付き！ (YOU FOUL)";
        }
        else if (state === STATE_SIGNAL) {
            const reactionMs = performance.now() - signalTime;
            
            // 敵がまだ反応していなければプレイヤーの勝利
            if (!enemyHasReacted) {
                state = STATE_RESULT;
                
                if (reactionMs / 1000 < bestTime) {
                    bestTime = reactionMs / 1000;
                }
                streak++;
                if (streak > maxStreak) {
                    maxStreak = streak;
                }
                
                enemy.isDefeated = true;
                enemy.vy = -15; // 敵が吹き飛ぶ
                resultText = `勝利！ (YOU: ${(reactionMs / 1000).toFixed(3)}s / ENEMY: ${(enemyReactionTime / 1000).toFixed(3)}s)`;
            }
        }
        else if (state === STATE_RESULT) {
            state = STATE_READY;
            resetCharacters();
        }
    }
});

function updateCharacterFloatY(charObj, now) {
    if (state === STATE_WAIT || state === STATE_READY) {
        charObj.y = charObj.baseY + Math.sin(now * 0.002) * 20;
    } 
    else if (state === STATE_SIGNAL) {
        if (freezeTime === 0) freezeTime = now;
        charObj.y = charObj.baseY + Math.sin(freezeTime * 0.002) * 20;
    }
    else if (state === STATE_RESULT) {
        if (charObj.isFoul || charObj.isDefeated) {
            charObj.y += charObj.vy;
        } else {
            charObj.y = charObj.baseY + Math.sin(freezeTime * 0.002) * 20;
        }
    }
}

function update() {
    const now = performance.now();

    // パーティクルの更新
    if (state !== STATE_SIGNAL) {
        particles.forEach(p => {
            p.y -= p.speed;
            if (p.y < -10) {
                p.y = canvas.height + 10;
                p.x = Math.random() * canvas.width;
            }
        });
    }

    // Y座標計算とアンチグラビティ演出
    updateCharacterFloatY(player, now);
    updateCharacterFloatY(enemy, now);

    // 待機時間終了 → 合図（斬）
    if (state === STATE_WAIT && now >= waitTimer) {
        state = STATE_SIGNAL;
        signalTime = now;
        freezeTime = now;
        
        // 敵の反応時間を計算（連勝するほど速くなる。最小150ms）
        enemyReactionTime = Math.max(150, 400 - (streak * 20) + Math.random() * 100);
        enemyHasReacted = false;
    }
    
    // 敵の反応処理
    if (state === STATE_SIGNAL) {
        if (!enemyHasReacted && now >= signalTime + enemyReactionTime) {
            enemyHasReacted = true;
            state = STATE_RESULT;
            player.isDefeated = true;
            player.vy = -20; // プレイヤーが倒される
            streak = 0; // 連勝リセット
            resultText = `敗北... (ENEMY: ${(enemyReactionTime / 1000).toFixed(3)}s)`;
        }
    }
}

function drawStickman(ctx, character, isFacingLeft) {
    ctx.save();
    ctx.translate(character.baseX, character.y);
    // 右側の敵キャラは反転させることで、左右対称に向き合う描画にする
    if (isFacingLeft) ctx.scale(-1, 1);
    
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // 頭
    ctx.beginPath();
    ctx.arc(0, -60, 15, 0, Math.PI * 2);
    ctx.stroke();

    if (character.isFoul || character.isDefeated) {
        // お手付き時や敗北時：手足をバタバタさせて飛ぶ
        ctx.beginPath();
        ctx.moveTo(0, -45);
        ctx.lineTo(0, 0);
        ctx.stroke(); 
        
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(-20, -60);
        ctx.moveTo(0, -30);
        ctx.lineTo(20, -60);
        ctx.stroke(); 
        
        const legOsc = Math.sin(performance.now() * 0.05);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-15, 30 + legOsc * 10);
        ctx.moveTo(0, 0);
        ctx.lineTo(15, 30 - legOsc * 10);
        ctx.stroke(); 
        
        // 刀（手放して飛んでいく）
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(30, -50 + legOsc * 20);
        ctx.lineTo(60, -70 + legOsc * 20);
        ctx.stroke();
    } else if (state === STATE_RESULT && !character.isFoul && !character.isDefeated) {
        // 成功時：刀を振り抜いた姿勢（残心）
        ctx.beginPath();
        ctx.moveTo(0, -45);
        ctx.lineTo(15, 0);
        ctx.stroke(); 
        
        ctx.beginPath();
        ctx.moveTo(15, 0);
        ctx.lineTo(40, 30); 
        ctx.moveTo(15, 0);
        ctx.lineTo(-20, 30); 
        ctx.stroke(); 
        
        ctx.beginPath();
        ctx.moveTo(5, -35);
        ctx.lineTo(30, -10);
        ctx.stroke(); 
        
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(30, -10);
        ctx.lineTo(90, 10); 
        ctx.stroke(); 
        
        ctx.beginPath();
        ctx.moveTo(-10, -5);
        ctx.lineTo(-50, 10);
        ctx.stroke(); 
    } else {
        // 待機中・合図：居合の構え（抜刀準備）
        ctx.beginPath();
        ctx.moveTo(0, -45);
        ctx.lineTo(0, 0);
        ctx.stroke(); 
        
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-20, 30); 
        ctx.moveTo(0, 0);
        ctx.lineTo(20, 30); 
        ctx.stroke(); 
        
        ctx.beginPath();
        ctx.moveTo(0, -35);
        ctx.lineTo(-15, -15); 
        ctx.moveTo(0, -35);
        ctx.lineTo(-5, -15); 
        ctx.stroke(); 
        
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-15, -15); 
        ctx.lineTo(-60, 5); 
        ctx.stroke(); 
    }
    
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // パーティクル描画
    particles.forEach(p => {
        ctx.fillStyle = `rgba(150, 200, 255, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // キャラクター描画（左：プレイヤー、右：敵NPC）
    drawStickman(ctx, player, false);
    drawStickman(ctx, enemy, true);
    
    // スコアUI描画
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Win Streak: ${streak}  (Max: ${maxStreak})`, 20, 40);
    const bestText = bestTime < 999 ? bestTime.toFixed(3) : "---";
    ctx.fillText(`Best Time: ${bestText}s`, 20, 70);

    // 状態に応じたUIテキストの描画
    ctx.textAlign = 'center';
    
    if (state === STATE_READY) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '40px sans-serif';
        ctx.fillText("SPACEキーで開始", canvas.width / 2, canvas.height / 2 - 50);
    } 
    else if (state === STATE_WAIT) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '30px sans-serif';
        ctx.fillText("合図を待て...", canvas.width / 2, canvas.height / 2 - 50);
    } 
    else if (state === STATE_SIGNAL) {
        ctx.font = 'bold 120px serif';
        ctx.fillStyle = '#FF2222';
        ctx.fillText("斬", canvas.width / 2, canvas.height / 2 + 10);
    } 
    else if (state === STATE_RESULT) {
        ctx.font = '35px sans-serif';
        if (player.isFoul || player.isDefeated) {
            ctx.fillStyle = '#FF4444';
        } else {
            ctx.fillStyle = '#44FF44';
        }
        ctx.fillText(resultText, canvas.width / 2, canvas.height / 2 - 50);
        
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px sans-serif';
        ctx.fillText("SPACEキーで次へ", canvas.width / 2, canvas.height / 2 + 60);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ゲームループ起動
loop();
</script>
</body>
</html>
